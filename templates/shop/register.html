{% extends 'shop/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="card p-4 p-md-5" style="width:100%;max-width:480px">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x" style="color:#764ba2"></i>
            <h3 class="fw-bold mt-2">Регистрация</h3>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label fw-semibold">Имя</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Иван" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Фамилия</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Иванов">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Логин</label>
                    <input type="text" name="username" class="form-control" placeholder="ivan123" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="ivan@example.com">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Пароль</label>
                    <input type="password" name="password" class="form-control" placeholder="Минимум 6 символов" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Тип аккаунта</label>
                    <select name="role" class="form-select">
                        <option value="buyer">Покупатель</option>
                        <option value="master">Мастер (продавец)</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-purple w-100 btn-lg">Зарегистрироваться</button>
                </div>
            </div>
        </form>
        <p class="text-center text-muted mt-3 mb-0">
            Уже есть аккаунт? <a href="/login/" style="color:#764ba2">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
