{% extends 'shop/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:75vh">
    <div class="card p-4 p-md-5" style="width:100%;max-width:420px">
        <div class="text-center mb-4">
            <i class="fas fa-hand-holding-heart fa-3x" style="color:#764ba2"></i>
            <h3 class="fw-bold mt-2">Вход в аккаунт</h3>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Логин</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Введите логин" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Пароль</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-purple w-100 btn-lg">Войти</button>
        </form>
        <p class="text-center text-muted mt-3 mb-0">
            Нет аккаунта? <a href="/register/" style="color:#764ba2">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
